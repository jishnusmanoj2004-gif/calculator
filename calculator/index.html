<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>calculator</title>
</head>
<body class="min-h-screen bg-neutral-900 flex items-center justify-center p-4 selection:bg-transparent">
    <div class="w-full max-w-xs bg-zinc-900 rounded-[2.5rem] p-5 shadow-2xl border border-zinc-800/50 transition-all duration-300">
        <div>
            <h1 class="text-xs text-center text-stone-500 tracking-widest">calculator</h1>
            <div class="px-2">
                <input type="text" id="input" 
                class="w-full text-white text-right text-5xl bg-transparent tracking-tight overflow-x-auto"
                placeholder="0"
                >
            </div>
            <div class="grid grid-cols-4 gap-3 text-white ">
                <button style="width: 50px; height: 50px;" class="text-white text-xl bg-zinc-700 rounded-full" onclick="onNumber(this.innerHTML)">1</button>
                <button style="width: 50px; height: 50px;" class="text-white bg-zinc-700 text-xl rounded-full" onclick="onNumber(this.innerHTML)">2</button>
                <button style="width: 50px; height: 50px;" class="text-white bg-zinc-700 text-xl rounded-full" onclick="onNumber(this.innerHTML)">3</button>
                <button style="width: 50px; height: 50px;" class="text-white bg-red-700 text-xl rounded-full"onclick="onOperator(this.innerHTML)">+</button>

                <button style="width: 50px; height: 50px;" class="text-white text-xl bg-zinc-700 rounded-full" onclick="onNumber(this.innerHTML)">4</button>
                <button style="width: 50px; height: 50px;" class="text-white text-xl bg-zinc-700 rounded-full" onclick="onNumber(this.innerHTML)">5</button>
                <button style="width: 50px; height: 50px;" class="text-white text-xl bg-zinc-700 rounded-full" onclick="onNumber(this.innerHTML)">6</button>
                <button style="width: 50px; height: 50px;" class="text-white text-xl bg-red-700 rounded-full" onclick="onOperator(this.innerHTML)">-</button>

                <button style="width: 50px; height: 50px;" class="text-white text-xl bg-zinc-700 rounded-full" onclick="onNumber(this.innerHTML)">7</button>
                <button style="width: 50px; height: 50px;" class="text-white text-xl bg-zinc-700 rounded-full" onclick="onNumber(this.innerHTML)">8</button>
                <button style="width: 50px; height: 50px;" class="text-white text-xl bg-zinc-700 rounded-full" onclick="onNumber(this.innerHTML)">9</button>
                <button style="width: 50px; height: 50px;" class="text-white text-xl bg-red-700 rounded-full" onclick="onOperator(this.innerHTML)">*</button>

                <button style="width: 50px; height: 50px;" class="text-white text-xl bg-zinc-700 rounded-full"onclick="onNUmber(this.innerHTML)">0</button>
                <button style="width: 50px; height: 50px;" class="text-white text-xl bg-zinc-700 rounded-full"onclick="onNUmber(this.innerHTML)">.</button>
                <button style="width: 50px; height: 50px;" class="text-white text-xl rounded-full bg-zinc-700" onclick="onOperator(this.innerHTML)">/</button>
                <button style="width: 50px; height: 50px;" class="text-red-700 text-xl bg-zinc-700 rounded-full" onclick="onclear">C</button>
                

                <button style="width: 270px; height: 50px;" class="text-3xl bg-red-700 rounded-full font-semibold !aspect-auto shadow-lg" onclick="onEqual">=</button>
            </div>
        </div>
    </div>
    <script src="./scripts.js"></script>
</body>
</html>
